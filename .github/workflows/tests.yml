---
name: Run tests
on:

  push:
    paths:
      - ".github/workflows/tests.yml"
      - "tests/**"
  pull_request:
    paths:
      - ".github/workflows/tests.yml"
      - "tests/**"
  workflow_dispatch:

env:
  IMAGE_NAME: "${{ github.event.repository.name }}"
  FEDORA_VERSION: "44"
  DEFAULT_TAG: "latest"

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  run_tests:
    name: Run tests on final OS image
#    if: >-
#      github.event_name == 'workflow_dispatch' ||
#      github.event.workflow_run.conclusion == 'success'

    runs-on: ubuntu-24.04

    timeout-minutes: 30

    steps:

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Decode Secure Boot keys
        run: |
          echo "$SECUREBOOT_KEY" > system_files/base/secureboot/MOK.key
          chmod 600 system_files/base/secureboot/MOK.key
        env:
          SECUREBOOT_KEY: ${{ secrets.SECUREBOOT_KEY }}

      # we need newer `act` version
      - name: Prepare dependencies
        run: |
          sudo apt update && sudo apt install -y podman systemd-container

          just_version="1.50.0"
          just_archive="just-${just_version}-x86_64-unknown-linux-musl.tar.gz"
          just_url="https://github.com/casey/just/releases/download/${just_version}/${just_archive}"
          just_sha256="27e011cd6328fadd632e59233d2cf5f18460b8a8c4269acd324c1a8669f34db0"

          curl --fail --location --show-error --silent --output "${just_archive}" "${just_url}"
          echo "${just_sha256}  ${just_archive}" | sha256sum --check
          tar -xzf "${just_archive}" just
          chmod +x just
          sudo install -m 0755 just /usr/local/bin/just

      - name: Cleanup
        run: |
          just clean && just sudo-clean && podman system prune --all --force

      - name: Build image
        run: |
          sudo env TESTING_ENVIRONMENT="TRUE" just build

      - name: Build VM image
        run: |
          sudo just build-qcow2

      - name: Run VM image
        run: |
          nohup sudo env VM_GPU="FALSE" just run-vm-qcow2 > vm.log 2>&1 &

      - name: Build test runner
        run: |
          sudo podman build -f tests/Containerfile -t kinoite-test-runner .

      - name: Run pytest integration tests
        env:
          TEST_SSH_WAIT_SECONDS: "900"
        run: |
          mkdir -p test-results
          sudo podman run --rm --network host \
            -v "${PWD}/tests/ssh:/ssh:ro,Z" \
            -v "${PWD}/test-results:/tmp/test-results" \
            kinoite-test-runner

      - name: Parse test report
        if: always()
        run: |
          python3 - <<'PY'
          import os
          import sys
          import xml.etree.ElementTree as ET
          from pathlib import Path

          report = Path("test-results/junit.xml")
          summary = Path(os.environ["GITHUB_STEP_SUMMARY"])

          if not report.exists():
              summary.write_text("## Pytest report\n\nJUnit report was not produced.\n", encoding="utf-8")
              sys.exit(1)

          root = ET.parse(report).getroot()
          suites = [root] if root.tag == "testsuite" else list(root.iter("testsuite"))

          def total(attribute):
              return sum(int(suite.attrib.get(attribute, 0)) for suite in suites)

          tests = total("tests")
          failures = total("failures")
          errors = total("errors")
          skipped = total("skipped")
          passed = tests - failures - errors - skipped

          lines = [
              "## Pytest report",
              "",
              f"- Passed: {passed}",
              f"- Failed: {failures}",
              f"- Errors: {errors}",
              f"- Skipped: {skipped}",
              f"- Total: {tests}",
              "",
          ]

          for case in root.iter("testcase"):
              problem = case.find("failure")
              if problem is None:
                  problem = case.find("error")
              if problem is None:
                  continue
              name = f"{case.attrib.get('classname', '')}.{case.attrib.get('name', '')}".strip(".")
              message = problem.attrib.get("message", "").splitlines()[0]
              lines.append(f"- `{name}`: {message}")

          summary.write_text("\n".join(lines), encoding="utf-8")
          PY

      - name: Debug
        if: always()
        run: |
          cat vm.log
