---
name: Build container image
on:
  
  pull_request:
    branches:
      - main
  schedule:
    - cron: '05 10 * * *'
  push:
    branches:
      - main
    paths-ignore:
      - "**.md"
      - "**.txt"
      - ".gitignore"
      - ".github/act/*"
      - ".github/workflows/tests.yml"
      - ".github/workflows/cleanup.yml"

  workflow_dispatch:

env:
  IMAGE_DESC: "${{ github.event.repository.name }}"
  IMAGE_NAME: "${{ github.event.repository.name }}"
  IMAGE_REGISTRY: "ghcr.io/${{ github.repository_owner }}"
  FEDORA_VERSION: "43"
  DEFAULT_TAG: "latest"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}-${{ inputs.brand_name}}-${{ inputs.stream_name }}
  cancel-in-progress: true

jobs:
  build_push:
    name: Build and push image
    strategy:
      fail-fast: false
      matrix:
        flavor: ["", "nvidia"]

    runs-on: ubuntu-24.04

    permissions:
      actions: read
      contents: read
      packages: write
      id-token: write

    timeout-minutes: 30

    steps:

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Get current date
        id: date
        run: |
          echo "date=$(date -u +%Y\-%m\-%d\T%H\:%M\:%S\Z)" >> $GITHUB_OUTPUT

      - name: Compute daily build sequence
        id: build_seq
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_NUMBER: ${{ github.run_number }}
          EVENT_NAME: ${{ github.event_name }}
          FEDORA_VERSION: ${{ env.FEDORA_VERSION }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          TAG_DATE="$(date -u +%Y%m%d)"
          START_OF_DAY="$(date -u +%Y-%m-%d)T00:00:00Z"
          START_OF_NEXT_DAY="$(date -u -d tomorrow +%Y-%m-%d)T00:00:00Z"
          API_URL="https://api.github.com/repos/${REPOSITORY}/actions/workflows/build.yml/runs?per_page=100&created=${START_OF_DAY}..${START_OF_NEXT_DAY}"

          RUNS_JSON="$(mktemp)"
          curl --fail --silent --show-error \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "$API_URL" > "$RUNS_JSON"

          DAILY_SEQUENCE="$(jq \
            --argjson run_number "${RUN_NUMBER}" \
            --arg event_name "${EVENT_NAME}" \
            '[.workflow_runs[]
              | select(.event == $event_name)
              | select(.run_number <= $run_number)
              | select(.conclusion == "success")
            ] | length + 1' \
            "$RUNS_JSON")"
          rm -fv "$RUNS_JSON"

          echo "daily_sequence=${DAILY_SEQUENCE}" >> "$GITHUB_OUTPUT"
          echo "date_tag=${TAG_DATE}.${DAILY_SEQUENCE}" >> "$GITHUB_OUTPUT"
          echo "version_tag=${FEDORA_VERSION}.${TAG_DATE}.${DAILY_SEQUENCE}" >> "$GITHUB_OUTPUT"

      - name: Image Metadata
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        id: metadata
        with:
          tags: |
            type=raw,value=${{ steps.build_seq.outputs.date_tag }}
            type=raw,value=${{ env.DEFAULT_TAG }}
            type=raw,value=${{ env.FEDORA_VERSION }}
            type=raw,value=${{ steps.build_seq.outputs.version_tag }}
            type=sha,enable=${{ github.event_name == 'pull_request' }}
            type=ref,event=pr
          labels: |
            org.opencontainers.image.created=${{ steps.date.outputs.date }}
            org.opencontainers.image.description=${{ env.IMAGE_DESC }}
            org.opencontainers.image.documentation=https://raw.githubusercontent.com/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}/${{ github.sha }}/README.md
            org.opencontainers.image.source=https://github.com/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}/blob/${{ github.sha }}/Containerfile
            org.opencontainers.image.title=${{ env.IMAGE_NAME }}
            org.opencontainers.image.url=https://github.com/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}/tree/${{ github.sha }}
            org.opencontainers.image.vendor=${{ github.repository_owner }}
            org.opencontainers.image.version=${{ steps.build_seq.outputs.version_tag }}
            containers.bootc=1
          sep-tags: ' '
          sep-annotations: ' '

      - name: Check secure boot key
        id: secret-check
        run: |
          if [ -z "${{ secrets.SECUREBOOT_KEY }}" ]; then
            echo "present=false" >> $GITHUB_OUTPUT
          else
            echo "present=true" >> $GITHUB_OUTPUT
          fi

      - name: Decode Secure Boot keys
        if: steps.secret-check.outputs.present == 'true'
        run: |
          echo "$SECUREBOOT_KEY" > system_files/base/secureboot/MOK.key
          chmod 600 system_files/base/secureboot/MOK.key
        env:
          SECUREBOOT_KEY: ${{ secrets.SECUREBOOT_KEY }}

      - name: Prepare build args file
        run: |
          cat <<'EOF' >>build_args.txt
          FEDORA_VERSION=${{ env.FEDORA_VERSION }}
          EOF

      - name: Build Image
        id: build_image
        run: |
          sudo -E buildah build \
            --target ${{ env.IMAGE_NAME }} \
            --file Containerfile \
            --build-arg-file build_args.txt \
            --tag raw-img .

# FIXME:
# vm starts, but tesing suite can not reach it. need to think on different approach
#      - name: Run integration tests
#        # bypass errors
#        # continue-on-error: true
#        run: |
#          sudo podman save --format docker-archive raw-img -o /tmp/raw-img.tar
#          sudo podman build -f tests/Containerfile -t kinoite-test-runner tests
#          sudo podman run --rm --privileged \
#            -v /tmp/raw-img.tar:/input/raw-img.tar:ro \
#            -v /var/lib/containers/storage:/var/lib/containers/storage \
#            -v /run/containers/storage:/run/containers/storage \
#            kinoite-test-runner \
#            "${{ matrix.flavor }}"

      - name: Run Rechunker
        id: rechunk
        uses: ublue-os/legacy-rechunk@a925083d9af7cb04b3e2a6e8c01bfa495f38b710 # v1.0.0
        with:
          rechunk: 'ghcr.io/ublue-os/legacy-rechunk:v1.0.0-x86_64'
          ref: 'raw-img'
          prev-ref: '${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.DEFAULT_TAG }}'
          skip_compression: false
          version: '${{ steps.metadata.outputs.tags }}'
          labels: '${{ steps.metadata.outputs.labels }}'

# FIXME:
# usage of newer rechunker failing due to differences in build stage
#      - name: Run Rechunker
#        id: rechunk
#        run: |
#          container=$(sudo buildah from raw-img)
#          mnt=$(sudo buildah mount $container)
#          sudo bash -c "rm -rf $mnt/run/.* $mnt/run/* $mnt/tmp/.* $mnt/tmp/*"
#          sudo buildah umount $container
#          sudo buildah commit --identity-label=false --rm $container raw-img
#
#          sudo podman run --rm --privileged --volume /var/lib/containers:/var/lib/containers \
#              localhost/raw-img \
#              rpm-ostree compose build-chunked-oci \
#              --bootc --max-layers 96 --format-version 2 \
#              --from localhost/raw-img --output containers-storage:localhost/chunked-img
#          sudo podman untag raw-img
#
#          echo "ref=containers-storage:localhost/chunked-img" >> "$GITHUB_OUTPUT"

      - name: Load in podman and tag
        run: |
          IMAGE=$(podman pull ${{ steps.rechunk.outputs.ref }})
          sudo rm -rf ${{ steps.rechunk.outputs.output }}
          for tag in ${{ steps.metadata.outputs.tags }}; do
            podman tag $IMAGE "${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}:$tag"
          done

      - name: Login to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121
        if: github.event_name != 'pull_request'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push To GHCR
        if: github.event_name != 'pull_request'
        run: |
          set -euo pipefail

          retries=5
          delay=10

          # Loop through each tag
          for tag in ${{ steps.metadata.outputs.tags }}; do
            echo "Pushing tag: $tag"

            for attempt in $(seq 1 $retries); do
              echo "  Attempt $attempt/$retries for $tag..."
              if podman push "${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}:$tag" --tls-verify=true; then
                echo "  Push of $tag succeeded"
                break
              fi

              if [ "$attempt" -lt "$retries" ]; then
                echo "  Push of $tag failed — retrying in $delay seconds..."
                sleep $delay
              else
                echo "  Push of $tag failed after $retries attempts"
                exit 1
              fi
            done
          done

      - name: Install Cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1
        with:
          cosign-release: "v2.6.1"

      - name: Sign container image
        if: github.event_name != 'pull_request' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        run: |
          IMAGE_FULL="${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}"
          for tag in ${{ steps.metadata.outputs.tags }}; do
            cosign sign -y --key env://COSIGN_PRIVATE_KEY $IMAGE_FULL:$tag
          done
        env:
          TAGS: ${{ steps.push.outputs.digest }}
          COSIGN_EXPERIMENTAL: false
          COSIGN_PRIVATE_KEY: ${{ secrets.SIGNING_SECRET }}
