name: Build container image (test)
on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths-ignore:
      - "**.md"
      - "**.txt"
      - "tests/**"
      - ".gitignore"
      - ".github/act/**"

env:
  IMAGE_NAME: "${{ github.event.repository.name }}"
  IMAGE_REGISTRY: "ghcr.io/${{ github.repository_owner }}"
  FEDORA_VERSION: "44"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  build_push:
    name: Build and push image
    strategy:
      fail-fast: true
      matrix:
        flavor: ["", "nvidia"]

    runs-on: ubuntu-24.04

    permissions:
      contents: read
      packages: write
      id-token: write

    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Compute image name
        id: image
        run: |
          if [ -n "${{ matrix.flavor }}" ]; then
            echo "name=${{ env.IMAGE_NAME }}-${{ matrix.flavor }}" >> "$GITHUB_OUTPUT"
            echo "default_tag=${{ matrix.flavor }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${{ env.IMAGE_NAME }}" >> "$GITHUB_OUTPUT"
            echo "default_tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Decode Secure Boot keys
        run: |
          echo "$SECUREBOOT_KEY" > system_files/base/secureboot/MOK.key
          chmod 600 system_files/base/secureboot/MOK.key
        env:
          SECUREBOOT_KEY: ${{ secrets.SECUREBOOT_KEY }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Containerfile
          target: ${{ steps.image.outputs.name }}
          build-args: |
            FEDORA_VERSION=${{ env.FEDORA_VERSION }}
          tags: ${{ env.IMAGE_REGISTRY }}/${{ steps.image.outputs.name }}:${{ steps.image.outputs.default_tag }}
          push: false
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Login, push, and signing are commented out until build is validated
